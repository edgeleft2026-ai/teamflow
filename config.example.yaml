# TeamFlow Configuration
# Copy this file to config.yaml and fill in your Feishu app credentials.

feishu:
  app_id: "cli_xxxxxxxxxxxx"
  app_secret: "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
  brand: "feishu"  # "feishu" for China, "lark" for international
  admin_open_id: ""  # Optional: your Feishu open_id for startup notification

# Agent / AI configuration (M2+)
agent:
  provider: ""  # provider ID (e.g. openai, deepseek, anthropic, qwen)
  api_mode: ""  # leave empty for auto-detection
  mcp_tools: "im.v1.*,docx.v1.*"  # MCP tools to enable (comma-separated)
  max_iterations: 10               # Max tool-use loop iterations
  timeout_seconds: 120             # Agent task timeout
  fast_model: "openai/gpt-4o-mini" # Model for simple tasks
  smart_model: "openai/gpt-4o"     # Model for analysis and reports
  reasoning_model: "openai/gpt-4o" # Model for complex reasoning

# Gitea (self-hosted Git service) configuration
gitea:
  base_url: "https://git.lighter.games"  # Your Gitea instance URL
  access_token: ""                        # Gitea access token (Settings > Applications > Access Tokens)
  default_private: true                   # Create private repos by default
  auto_create: true                       # Auto-create repo when git_repo_path is not provided
